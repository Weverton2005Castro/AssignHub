services:
  - type: web
    name: subscriptionhub-api
    runtime: docker
    plan: free

    dockerfilePath: ./apps/api/Dockerfile.render
    dockerContext: .

    healthCheckPath: /health/ready

    autoDeploy: false

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 4000

      - key: DATABASE_URL
        sync: false

      - key: REDIS_URL
        sync: false

      - key: JWT_ACCESS_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: ENCRYPTION_KEY
        generateValue: true

      - key: CORS_ORIGINS
        value: https://subscriptionhub-web.onrender.com

      - key: APP_URL
        value: https://subscriptionhub-web.onrender.com

      - key: API_URL
        value: https://subscriptionhub-api.onrender.com

      - key: SMTP_HOST
        value: smtp.gmail.com

      - key: SMTP_PORT
        value: "587"

      - key: SMTP_SECURE
        value: "false"

      - key: OPENAI_MODEL
        value: gpt-4o-mini

      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small

      - key: THROTTLE_TTL_MS
        value: "60000"

      - key: THROTTLE_LIMIT
        value: "100"

  - type: worker
    name: subscriptionhub-worker
    runtime: docker
    plan: free

    dockerfilePath: ./apps/api/Dockerfile.worker
    dockerContext: .

    autoDeploy: false

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        sync: false

      - key: REDIS_URL
        sync: false

      - key: JWT_ACCESS_SECRET
        sync: false

      - key: JWT_REFRESH_SECRET
        sync: false

      - key: ENCRYPTION_KEY
        sync: false