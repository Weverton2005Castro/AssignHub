services:
  postgres:
    image: postgres:16-alpine
    container_name: shub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: subscriptionhub
      POSTGRES_PASSWORD: subscriptionhub
      POSTGRES_DB: subscriptionhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subscriptionhub -d subscriptionhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: shub-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: shub-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://subscriptionhub:subscriptionhub@postgres:5432/subscriptionhub?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret-change-me-in-production-32chars
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me-in-production-32chars
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      CORS_ORIGINS: http://localhost:3000
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      APP_URL: http://localhost:3000
      API_URL: http://localhost:4000
    ports:
      - "4000:4000"
    profiles:
      - full

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: shub-worker
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://subscriptionhub:subscriptionhub@postgres:5432/subscriptionhub?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret-change-me-in-production-32chars
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me-in-production-32chars
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    profiles:
      - full

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: shub-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-nextauth-secret-change-me-in-production-32chars
    ports:
      - "3000:3000"
    profiles:
      - full

volumes:
  postgres_data:
  redis_data:
